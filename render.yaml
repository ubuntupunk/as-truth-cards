services:
  - type: web
    name: as-truth-cards
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build && npx prisma generate
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
    hooks:
      - type: post-deploy
        command: npx prisma generate && npx prisma db push --accept-data-loss && pnpm db:seed
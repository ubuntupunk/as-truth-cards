services:
  - type: web
    name: as-truth-cards
    runtime: node
    plan: starter
    buildCommand: npm install && npm build && npx prisma generate --schema=prisma/schema.prisma
    startCommand: npx tsx server/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: VITE_ADMIN_EMAIL
        sync: false
    hooks:
      - type: post-deploy
        command: npx prisma generate
